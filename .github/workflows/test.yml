name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: unit tests (no ViennaRNA)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package (without ViennaRNA)
        run: |
          python -m pip install --upgrade pip
          # Install everything except viennarna; tests marked needs_rna will skip.
          pip install numpy pandas scipy matplotlib seaborn pyyaml biopython tqdm pytest pytest-cov ruff
          pip install --no-deps -e .
      - name: Lint
        run: ruff check src tests
      - name: Run unit tests (skipping ViennaRNA-dependent ones)
        run: pytest -q

  integration:
    name: integration tests (with ViennaRNA)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Conda env with ViennaRNA + RNAstructure
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: mtrnafeat
          auto-activate-base: false
      - name: Install package
        run: pip install --no-deps -e .
      - name: Run full test suite
        run: pytest -q
      - name: Smoke test on bundled fixtures
        run: bash examples/01_smoke_mini.sh
